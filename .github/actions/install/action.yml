name: 'Install'
description: 'Prepares the repo for a job by checking out and installing dependencies'
inputs:
    node-version:
        description: 'The node version to setup'
        required: true
    registry-url:
        description: 'Define registry-url'
        required: false

runs:
    using: 'composite'
    steps:
        -   name: Use Node.js ${{ inputs.node-version }}
            uses: actions/setup-node@v4
            with:
                node-version: ${{ inputs.node-version }}
                registry-url: ${{ inputs.registry-url }}

        # The lockfile is generated and validated with npm 11. Node 22 ships
        # npm 10, whose `npm ci` treats a transitive *optional* peer conflict
        # (`unbuild`'s `peerOptional typescript@^5.9.2` vs our `typescript@^6`)
        # as a fatal ERESOLVE; npm 11 downgraded that to a warning. Pin npm to
        # 11 so CI installs the lockfile exactly as it resolves locally — no
        # dependency-tree change, just a more lenient (and lockfile-matching)
        # installer. Drop this once `unbuild` widens its TypeScript peer range.
        -   name: Pin npm
            shell: bash
            run: npm install -g npm@11

        -   name: Use cache
            uses: actions/cache@v4
            with:
                path: |
                    node_modules
                    */*/node_modules
                key: ${{ runner.os }}-install-${{ hashFiles('**/package-lock.json') }}
                # No `restore-keys:` — a prefix-match restore would put a stale
                # node_modules tree (built against the previous lockfile) onto
                # disk, and `npm ci` would then fail with
                # `Missing: <pkg>@<old-version> from lock file` whenever the
                # lockfile changed (e.g. a Dependabot bump). Exact-match only:
                # lockfile changes invalidate the cache cleanly and the install
                # step does a fresh download. Trade-off: ~30s on cold cache.

        -   name: Install
            shell: bash
            run: |
                npm ci
